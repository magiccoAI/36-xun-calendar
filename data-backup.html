<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金钱观察数据备份与恢复</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center">
            💰 金钱观察数据备份与恢复
        </h1>
        
        <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">📋 当前数据状态</h2>
            <div id="dataStatus" class="space-y-2 text-sm text-gray-600">
                <p>检查中...</p>
            </div>
        </div>
        
        <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">💾 备份数据</h2>
            <p class="text-gray-600 mb-4">导出所有金钱观察相关数据到本地文件</p>
            <button onclick="exportData()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg transition-colors">
                导出数据
            </button>
        </div>
        
        <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">📥 恢复数据</h2>
            <p class="text-gray-600 mb-4">从备份文件恢复数据</p>
            <input type="file" id="fileInput" accept=".json" class="mb-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            <button onclick="importData()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg transition-colors">
                导入数据
            </button>
        </div>
        
        <div class="bg-white rounded-2xl shadow-lg p-8 mb-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">🔄 访问最新版本</h2>
            <p class="text-gray-600 mb-4">使用缓存破坏链接访问最新版本</p>
            <div class="space-y-2">
                <a href="https://magiccoai.github.io/36-xun-calendar/?v=20260403-01" target="_blank" class="block bg-indigo-500 hover:bg-indigo-600 text-white px-6 py-3 rounded-lg transition-colors text-center">
                    访问 GitHub Pages 最新版本
                </a>
                <a href="http://localhost:8000" target="_blank" class="block bg-purple-500 hover:bg-purple-600 text-white px-6 py-3 rounded-lg transition-colors text-center">
                    访问本地预览版本
                </a>
            </div>
        </div>
        
        <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-6">
            <h3 class="text-lg font-semibold text-yellow-800 mb-2">⚠️ 重要提醒</h3>
            <ul class="text-sm text-yellow-700 space-y-1">
                <li>• 在访问 GitHub Pages 前，请先备份数据</li>
                <li>• GitHub Pages 部署需要 2-10 分钟</li>
                <li>• 建议使用本地预览进行测试</li>
                <li>• 确认功能正常后再使用线上版本</li>
            </ul>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = [
            'moneyObservationDrafts',
            'moneyObservationSummaries', 
            'moneyUserIntentions',
            'currentXunPeriod',
            'moneyAwarenessFormData'
        ];

        function checkDataStatus() {
            const statusDiv = document.getElementById('dataStatus');
            let html = '';
            
            STORAGE_KEYS.forEach(key => {
                const data = localStorage.getItem(key);
                const hasData = data && data !== 'null' && data !== '{}';
                const size = data ? new Blob([data]).size : 0;
                
                html += `
                    <div class="flex justify-between items-center p-2 rounded ${hasData ? 'bg-green-50' : 'bg-gray-50'}">
                        <span class="font-medium">${key}</span>
                        <span class="text-xs ${hasData ? 'text-green-600' : 'text-gray-500'}">
                            ${hasData ? `✅ ${size} bytes` : '❌ 无数据'}
                        </span>
                    </div>
                `;
            });
            
            statusDiv.innerHTML = html;
        }

        function exportData() {
            const backup = {};
            STORAGE_KEYS.forEach(key => {
                backup[key] = localStorage.getItem(key);
            });
            
            const dataStr = JSON.stringify(backup, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `money-data-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            alert('✅ 数据已导出！');
        }

        function importData() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert('❌ 请选择备份文件');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    Object.keys(data).forEach(key => {
                        if (data[key] !== null) {
                            localStorage.setItem(key, data[key]);
                        }
                    });
                    
                    alert('✅ 数据已恢复！');
                    checkDataStatus();
                } catch (error) {
                    alert('❌ 文件格式错误：' + error.message);
                }
            };
            
            reader.readAsText(file);
        }

        // 页面加载时检查数据状态
        checkDataStatus();
    </script>
</body>
</html>
