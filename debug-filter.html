<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据过滤测试</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .section { margin: 20px 0; padding: 15px; background: white; border-radius: 8px; }
        .error { color: red; }
        .success { color: green; }
        .debug { color: #666; }
        pre { background: #f8f8f8; padding: 10px; border-radius: 4px; overflow-x: auto; }
        .record { border: 1px solid #ddd; margin: 5px 0; padding: 10px; border-radius: 4px; }
        .in-range { background: #e8f5e8; }
        .out-range { background: #ffe8e8; }
    </style>
</head>
<body>
    <h1>🔍 本旬数据过滤测试</h1>
    
    <div class="section">
        <h2>选择要测试的旬</h2>
        <div>
            <label>选择旬数: </label>
            <select id="xun-selector" onchange="updateTestDate()">
                <option value="1">第1旬 (1月1-10日)</option>
                <option value="2">第2旬 (1月11-20日)</option>
                <option value="3">第3旬 (1月21-31日)</option>
                <option value="4">第4旬 (2月1-10日)</option>
                <option value="5">第5旬 (2月11-20日)</option>
                <option value="6">第6旬 (2月21-28/29日)</option>
                <option value="7">第7旬 (3月1-10日)</option>
                <option value="8">第8旬 (3月11-20日)</option>
                <option value="9">第9旬 (3月21-31日)</option>
                <option value="10">第10旬 (4月1-10日)</option>
                <option value="11">第11旬 (4月11-20日)</option>
                <option value="12">第12旬 (4月21-30日)</option>
            </select>
            <button onclick="setCurrentXun()">设置为当前旬</button>
        </div>
    </div>
    
    <div class="section">
        <h2>当前旬范围计算</h2>
        <div id="xun-range-info">计算中...</div>
    </div>
    
    <div class="section">
        <h2>存储中的所有数据</h2>
        <div id="all-records">检查中...</div>
    </div>
    
    <div class="section">
        <h2>过滤结果（当前旬内的记录）</h2>
        <div id="filtered-records">过滤中...</div>
    </div>
    
    <div class="section">
        <h2>数据有效性检查</h2>
        <div id="validity-check">验证中...</div>
    </div>
    
    <div class="section">
        <h2>添加测试数据</h2>
        <button onclick="addTestDataForCurrentXun()">为当前旬添加测试数据</button>
        <button onclick="addTestDataForOtherXun()">为其他旬添加测试数据</button>
        <button onclick="clearAllData()">清空所有数据</button>
    </div>

    <script>
        let currentTestXun = null;
        
        // 根据旬数计算日期范围
        function getXunRangeByIndex(xunIndex, year = 2026) {
            const xunStartDates = [
                new Date(year, 0, 1),   // 第1旬: 1月1-10日
                new Date(year, 0, 11),  // 第2旬: 1月11-20日
                new Date(year, 0, 21),  // 第3旬: 1月21-31日
                new Date(year, 1, 1),   // 第4旬: 2月1-10日
                new Date(year, 1, 11),  // 第5旬: 2月11-20日
                new Date(year, 1, 21),  // 第6旬: 2月21-28/29日
                new Date(year, 2, 1),   // 第7旬: 3月1-10日
                new Date(year, 2, 11),  // 第8旬: 3月11-20日
                new Date(year, 2, 21),  // 第9旬: 3月21-31日
                new Date(year, 3, 1),   // 第10旬: 4月1-10日
                new Date(year, 3, 11),  // 第11旬: 4月11-20日
                new Date(year, 3, 21),  // 第12旬: 4月21-30日
            ];
            
            if (xunIndex < 1 || xunIndex > 12) return null;
            
            const startDate = xunStartDates[xunIndex - 1];
            let endDate = new Date(startDate);
            endDate.setDate(startDate.getDate() + 9); // 加10天
            
            // 处理月末特殊情况
            if (xunIndex === 3) { // 1月下旬
                endDate = new Date(year, 1, 0); // 1月最后一天
            } else if (xunIndex === 6) { // 2月下旬
                endDate = new Date(year, 2, 0); // 2月最后一天
            } else if (xunIndex === 9) { // 3月下旬
                endDate = new Date(year, 3, 0); // 3月最后一天
            } else if (xunIndex === 12) { // 4月下旬
                endDate = new Date(year, 4, 0); // 4月最后一天
            }
            
            return { startDate, endDate, xunIndex };
        }
        
        // 设置当前测试的旬
        window.setCurrentXun = function() {
            const selector = document.getElementById('xun-selector');
            currentTestXun = parseInt(selector.value);
            runTest();
        };
        
        // 更新测试日期
        window.updateTestDate = function() {
            const selector = document.getElementById('xun-selector');
            const xunIndex = parseInt(selector.value);
            const xunRange = getXunRangeByIndex(xunIndex);
            
            if (xunRange) {
                selector.title = `测试日期范围: ${formatDate(xunRange.startDate)} ~ ${formatDate(xunRange.endDate)}`;
            }
        };
        
        // 计算旬范围
        function calculateXunRange(targetDate = new Date()) {
            // 如果有指定测试旬，使用测试旬
            if (currentTestXun) {
                return getXunRangeByIndex(currentTestXun);
            }
            
            // 否则使用传入的日期计算
            const year = targetDate.getFullYear();
            const month = targetDate.getMonth();
            const date = targetDate.getDate();
            
            // 计算当前是第几旬
            const xunIndex = Math.floor((date - 1) / 10) + 1;
            const startDate = new Date(year, month, (xunIndex - 1) * 10 + 1);
            let endDate = new Date(year, month, xunIndex * 10);
            
            // 处理月末最后一天可能不足10天的情况
            const nextMonth = new Date(year, month + 1, 1);
            if (endDate > nextMonth) {
                endDate = new Date(nextMonth);
                endDate.setDate(0); // 上个月的最后一天
            }
            
            return { startDate, endDate, xunIndex };
        }
        
        // 格式化日期
        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }
        
        // 显示旬范围信息
        function displayXunRange() {
            const now = new Date();
            const { startDate, endDate, xunIndex } = calculateXunRange(now);
            
            let html = `
                <p><strong>当前日期:</strong> ${formatDate(now)}</p>
            `;
            
            if (currentTestXun) {
                html += `<p><strong>测试旬:</strong> 第${currentTestXun}旬</p>`;
            } else {
                html += `<p><strong>当前旬:</strong> 第${xunIndex}旬</p>`;
            }
            
            html += `
                <p><strong>旬范围:</strong> ${formatDate(startDate)} ~ ${formatDate(endDate)}</p>
                <p><strong>包含天数:</strong> ${Math.floor((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1} 天</p>
            `;
            
            document.getElementById('xun-range-info').innerHTML = html;
            
            return { startDate, endDate };
        }
        
        // 显示所有存储的数据
        function displayAllRecords() {
            const userData = JSON.parse(localStorage.getItem('xun_calendar_user_data') || '{}');
            const keys = Object.keys(userData).sort();
            
            if (keys.length === 0) {
                document.getElementById('all-records').innerHTML = '<p class="error">❌ 没有找到任何数据</p>';
                return {};
            }
            
            let html = `<p><strong>总共 ${keys.length} 天的数据:</strong></p>`;
            keys.forEach(dateStr => {
                const record = userData[dateStr];
                html += `
                    <div class="record">
                        <strong>${dateStr}</strong> - 
                        keys: [${Object.keys(record).join(', ')}] - 
                        body_state: ${record.body_state ? record.body_state.title : '无'}
                    </div>
                `;
            });
            
            document.getElementById('all-records').innerHTML = html;
            return userData;
        }
        
        // 模拟数据过滤逻辑
        function filterRecords(userData, xunRange) {
            const entries = Object.entries(userData);
            const filtered = [];
            const debug = [];
            
            entries.forEach(([dateStr, record]) => {
                const date = new Date(dateStr);
                const isValidDate = !isNaN(date.getTime()) && date >= xunRange.startDate && date <= xunRange.endDate;
                const hasData = record && typeof record === 'object' && Object.keys(record).length > 0;
                
                debug.push({
                    date: dateStr,
                    isValidDate,
                    hasData,
                    dateInRange: date >= xunRange.startDate && date <= xunRange.endDate,
                    recordKeys: record ? Object.keys(record) : null,
                    willPass: isValidDate && hasData
                });
                
                if (isValidDate && hasData) {
                    filtered.push([dateStr, record]);
                }
            });
            
            return { filtered, debug };
        }
        
        // 显示过滤结果
        function displayFilteredRecords(userData, xunRange) {
            const { filtered, debug } = filterRecords(userData, xunRange);
            
            // 显示调试信息
            let debugHtml = '<h3>过滤调试信息:</h3>';
            debug.forEach(item => {
                const className = item.willPass ? 'in-range' : 'out-range';
                debugHtml += `
                    <div class="record ${className}">
                        <strong>${item.date}</strong> - 
                        日期有效: ${item.isValidDate ? '✅' : '❌'} - 
                        有数据: ${item.hasData ? '✅' : '❌'} - 
                        通过过滤: ${item.willPass ? '✅' : '❌'}
                        <br><small>keys: [${item.recordKeys ? item.recordKeys.join(', ') : '无'}]</small>
                    </div>
                `;
            });
            
            // 显示最终结果
            let resultHtml = `<h3>最终过滤结果 (${filtered.length} 条):</h3>`;
            if (filtered.length === 0) {
                resultHtml += '<p class="error">❌ 当前旬范围内没有找到有效数据</p>';
            } else {
                filtered.forEach(([dateStr, record]) => {
                    resultHtml += `
                        <div class="record in-range">
                            <strong>${dateStr}</strong> - 
                            body_state: ${record.body_state ? record.body_state.title : '无'} - 
                            sleep: ${record.sleepData?.duration || '无'}h - 
                            exercise: ${record.metrics?.exercise || '无'}min
                        </div>
                    `;
                });
            }
            
            document.getElementById('filtered-records').innerHTML = debugHtml + resultHtml;
            return filtered;
        }
        
        // 数据有效性检查
        function checkDataValidity(filteredRecords) {
            let html = '<h3>数据有效性分析:</h3>';
            
            if (filteredRecords.length === 0) {
                html += '<p class="error">❌ 没有数据可分析</p>';
            } else {
                let withBodyState = 0;
                let withSleep = 0;
                let withExercise = 0;
                let withReading = 0;
                
                filteredRecords.forEach(([dateStr, record]) => {
                    if (record.body_state) withBodyState++;
                    if (record.sleepData) withSleep++;
                    if (record.metrics?.exercise > 0) withReading++;
                    if (record.metrics?.reading > 0) withReading++;
                });
                
                html += `
                    <p>记录总数: ${filteredRecords.length}</p>
                    <p>有body_state: ${withBodyState}/${filteredRecords.length} (${(withBodyState/filteredRecords.length*100).toFixed(1)}%)</p>
                    <p>有睡眠数据: ${withSleep}/${filteredRecords.length} (${(withSleep/filteredRecords.length*100).toFixed(1)}%)</p>
                    <p>有运动数据: ${withExercise}/${filteredRecords.length} (${(withExercise/filteredRecords.length*100).toFixed(1)}%)</p>
                    <p>有阅读数据: ${withReading}/${filteredRecords.length} (${(withReading/filteredRecords.length*100).toFixed(1)}%)</p>
                `;
                
                if (withBodyState === 0) {
                    html += '<p class="error">⚠️ 没有精力状态数据，平均精力将显示为"--"</p>';
                }
                if (withSleep === 0) {
                    html += '<p class="error">⚠️ 没有睡眠数据，平均睡眠将显示为0</p>';
                }
            }
            
            document.getElementById('validity-check').innerHTML = html;
        }
        
        // 为当前旬添加测试数据
        window.addTestDataForCurrentXun = function() {
            const now = new Date();
            const { startDate, endDate } = calculateXunRange(now);
            
            const testData = {};
            let currentDate = new Date(startDate);
            
            while (currentDate <= endDate) {
                const dateStr = formatDate(currentDate);
                testData[dateStr] = {
                    sleepData: { 
                        duration: 6 + Math.random() * 3, // 6-9小时
                        quality: 5 + Math.random() * 5 // 5-10分
                    },
                    metrics: {
                        wealth: 5 + Math.random() * 5,
                        exercise: Math.floor(Math.random() * 60), // 0-60分钟
                        reading: Math.floor(Math.random() * 30) // 0-30分钟
                    },
                    emotions: ['focused', 'calm', 'energetic'].slice(0, Math.floor(Math.random() * 3) + 1),
                    body_state: {
                        title: ['需要恢复', '正常运转', '状态很好', '高能日'][Math.floor(Math.random() * 4)],
                        id: 'test'
                    }
                };
                currentDate.setDate(currentDate.getDate() + 1);
            }
            
            localStorage.setItem('xun_calendar_user_data', JSON.stringify(testData));
            location.reload();
        };
        
        // 为其他旬添加测试数据
        window.addTestDataForOtherXun = function() {
            const now = new Date();
            const { startDate } = calculateXunRange(now);
            
            // 为上旬添加数据
            const lastXunStart = new Date(startDate);
            lastXunStart.setDate(lastXunStart.getDate() - 10);
            
            const testData = {};
            for (let i = 0; i < 3; i++) {
                const date = new Date(lastXunStart);
                date.setDate(date.getDate() + i);
                const dateStr = formatDate(date);
                testData[dateStr] = {
                    sleepData: { duration: 7, quality: 8 },
                    metrics: { exercise: 30, reading: 15 },
                    emotions: ['focused'],
                    body_state: { title: '正常运转', id: 'test' }
                };
            }
            
            localStorage.setItem('xun_calendar_user_data', JSON.stringify(testData));
            location.reload();
        };
        
        // 清空所有数据
        window.clearAllData = function() {
            localStorage.removeItem('xun_calendar_user_data');
            location.reload();
        };
        
        // 主函数
        function runTest() {
            try {
                const xunRange = displayXunRange();
                const userData = displayAllRecords();
                const filteredRecords = displayFilteredRecords(userData, xunRange);
                checkDataValidity(filteredRecords);
            } catch (error) {
                console.error('测试过程中出错:', error);
                document.body.innerHTML += `<div class="error"><h2>❌ 测试错误</h2><pre>${error.stack}</pre></div>`;
            }
        }
        
        // 页面加载完成后运行测试
        runTest();
    </script>
</body>
</html>
