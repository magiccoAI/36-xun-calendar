<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#3b82f6"/>
  
  <!-- Calendar grid representing 36 xun -->
  <rect x="6" y="8" width="20" height="16" fill="white" rx="2"/>
  
  <!-- Grid lines for xun divisions -->
  <line x1="6" y1="12" x2="26" y2="12" stroke="#3b82f6" stroke-width="0.5"/>
  <line x1="6" y1="16" x2="26" y2="16" stroke="#3b82f6" stroke-width="0.5"/>
  <line x1="6" y1="20" x2="26" y2="20" stroke="#3b82f6" stroke-width="0.5"/>
  
  <!-- Vertical lines -->
  <line x1="11" y1="8" x2="11" y2="24" stroke="#3b82f6" stroke-width="0.5"/>
  <line x1="16" y1="8" x2="16" y2="24" stroke="#3b82f6" stroke-width="0.5"/>
  <line x1="21" y1="8" x2="21" y2="24" stroke="#3b82f6" stroke-width="0.5"/>
  
  <!-- Center highlight for current xun -->
  <rect x="11" y="12" width="5" height="4" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Small text "36" -->
  <text x="16" y="28" text-anchor="middle" fill="white" font-family="Arial" font-size="6" font-weight="bold">36</text>
</svg>
