<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Circular Sleep Selector Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Enhanced Sleep Selector Test</h1>
        
        <!-- Enhanced Sleep Selector -->
        <div id="sleep-selector-container"></div>
        
        <!-- Test Controls -->
        <div class="mt-8 space-y-4">
            <button onclick="testOverlap()" class="w-full bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Test Overlap Handling
            </button>
            <button onclick="testStateManagement()" class="w-full bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                Test State Management
            </button>
            <button onclick="getCurrentData()" class="w-full bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">
                Get Current Data
            </button>
            <button onclick="resetSelector()" class="w-full bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                Reset
            </button>
        </div>
        
        <!-- Debug Output -->
        <div class="mt-6 p-4 bg-gray-100 rounded">
            <h3 class="font-semibold text-gray-700 mb-2">Debug Output:</h3>
            <pre id="debug-output" class="text-sm text-gray-600"></pre>
        </div>
    </div>

    <script type="module">
        import { CircularSleepSelector } from './src/components/CircularSleepSelector.js';
        
        let selector;
        
        // Initialize selector
        document.addEventListener('DOMContentLoaded', () => {
            selector = new CircularSleepSelector('sleep-selector-container');
            log('Enhanced CircularSleepSelector initialized successfully!');
        });
        
        // Test functions
        window.testOverlap = function() {
            log('Testing overlap handling...');
            // Set times that will overlap
            selector.state.bedtimeMinutes = 1380; // 23:00
            selector.state.wakeTimeMinutes = 1410; // 23:30 (very close)
            selector.updateHandles();
            log('Set bedtime to 23:00 and wake time to 23:30 - handles should overlap and show offset');
        };
        
        window.testStateManagement = function() {
            log('Testing state management...');
            // Test state proxy
            selector.state.bedtimeMinutes = 1320; // 22:00
            selector.state.wakeTimeMinutes = 360;  // 06:00
            selector.state.sleepQuality = 'excellent';
            log('Updated state via proxy - bedtime: 22:00, wake: 06:00, quality: excellent');
        };
        
        window.getCurrentData = function() {
            const data = selector.getSleepData();
            log('Current sleep data: ' + JSON.stringify(data, null, 2));
        };
        
        window.resetSelector = function() {
            selector.reset();
            log('Selector reset to defaults');
        };
        
        function log(message) {
            const output = document.getElementById('debug-output');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent = `[${timestamp}] ${message}\n` + output.textContent;
        }
    </script>
</body>
</html>
