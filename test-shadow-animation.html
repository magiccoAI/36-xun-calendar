<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阴影区域动效测试</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shadow-indicator {
            animation: shadowPulse 2s infinite;
        }
        @keyframes shadowPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        .performance-badge {
            font-family: 'Courier New', monospace;
            font-size: 11px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-900 to-purple-900 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">钟表阴影区域动效测试</h1>
            <p class="text-purple-200">验证夜间区域阴影是否实时跟随手柄移动</p>
        </div>
        
        <!-- Main Test Area -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Sleep Selector -->
            <div class="bg-white/10 backdrop-blur-lg rounded-2xl p-6 border border-white/20">
                <h2 class="text-xl font-semibold text-white mb-4">睡眠选择器</h2>
                <div id="sleep-selector-test" class="flex justify-center"></div>
                
                <!-- Shadow Status -->
                <div class="mt-6 p-4 bg-black/30 rounded-lg">
                    <h3 class="text-sm font-semibold text-purple-300 mb-2">阴影状态监控</h3>
                    <div class="space-y-1 text-xs text-purple-200">
                        <div class="flex justify-between">
                            <span>阴影路径:</span>
                            <span id="shadow-path" class="font-mono text-green-400">已更新</span>
                        </div>
                        <div class="flex justify-between">
                            <span>过渡状态:</span>
                            <span id="transition-state" class="font-mono text-blue-400">正常</span>
                        </div>
                        <div class="flex justify-between">
                            <span>拖拽状态:</span>
                            <span id="drag-status" class="font-mono text-yellow-400">未激活</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Test Controls -->
            <div class="space-y-6">
                <!-- Animation Performance -->
                <div class="bg-white/10 backdrop-blur rounded-xl p-4 border border-white/20">
                    <h3 class="text-white font-semibold mb-4">动效性能监控</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div class="bg-black/30 rounded p-3">
                            <div class="text-gray-400">帧率</div>
                            <div id="fps-display" class="text-2xl font-bold text-green-400">60</div>
                        </div>
                        <div class="bg-black/30 rounded p-3">
                            <div class="text-gray-400">阴影更新延迟</div>
                            <div id="shadow-delay" class="text-2xl font-bold text-blue-400">0ms</div>
                        </div>
                    </div>
                </div>
                
                <!-- Test Scenarios -->
                <div class="bg-white/10 backdrop-blur rounded-xl p-4 border border-white/20">
                    <h3 class="text-white font-semibold mb-4">测试场景</h3>
                    <div class="space-y-3">
                        <button onclick="testSmoothDrag()" class="w-full bg-gradient-to-r from-green-500 to-emerald-500 text-white px-4 py-2 rounded-lg hover:from-green-600 hover:to-emerald-600 transition-all">
                            🎯 平滑拖拽测试
                        </button>
                        <button onclick="testRapidChanges()" class="w-full bg-gradient-to-r from-orange-500 to-red-500 text-white px-4 py-2 rounded-lg hover:from-orange-600 hover:to-red-600 transition-all">
                            ⚡ 快速变化测试
                        </button>
                        <button onclick="testCrossMidnight()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white px-4 py-2 rounded-lg hover:from-purple-600 hover:to-pink-600 transition-all">
                            🌙 跨午夜测试
                        </button>
                        <button onclick="testShadowSync()" class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-white px-4 py-2 rounded-lg hover:from-blue-600 hover:to-cyan-600 transition-all">
                            🔄 阴影同步测试
                        </button>
                        <button onclick="resetTest()" class="w-full bg-gray-600 text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition-colors">
                            🔄 重置
                        </button>
                    </div>
                </div>
                
                <!-- Debug Output -->
                <div class="bg-black/30 backdrop-blur rounded-xl p-4 border border-red-500/30">
                    <h3 class="text-red-400 font-semibold mb-3 performance-badge">调试输出</h3>
                    <div id="debug-log" class="text-red-300 performance-badge text-xs h-32 overflow-y-auto whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { CircularSleepSelector } from './src/components/CircularSleepSelector.js';
        
        let selector;
        let lastShadowUpdate = 0;
        let frameCount = 0;
        let lastFpsTime = 0;
        
        // Initialize selector
        document.addEventListener('DOMContentLoaded', () => {
            selector = new CircularSleepSelector('sleep-selector-test');
            
            // Monitor shadow updates
            monitorShadowPerformance();
            
            log('🎨 阴影区域动效测试初始化完成');
            log('📊 开始监控阴影更新性能...');
        });
        
        // Performance monitoring
        function monitorShadowPerformance() {
            let lastTime = performance.now();
            
            function updateMonitor() {
                const currentTime = performance.now();
                const deltaTime = currentTime - lastTime;
                const fps = Math.round(1000 / deltaTime);
                
                frameCount++;
                
                // Update FPS every 500ms
                if (currentTime - lastFpsTime > 500) {
                    document.getElementById('fps-display').textContent = fps;
                    lastFpsTime = currentTime;
                }
                
                // Monitor shadow update delay
                if (selector.state.isDragging) {
                    const delay = currentTime - lastShadowUpdate;
                    document.getElementById('shadow-delay').textContent = Math.round(delay) + 'ms';
                }
                
                // Update status indicators
                updateStatusIndicators();
                
                lastTime = currentTime;
                requestAnimationFrame(updateMonitor);
            }
            
            requestAnimationFrame(updateMonitor);
        }
        
        function updateStatusIndicators() {
            const nightZone = document.getElementById('night-zone');
            if (nightZone) {
                // Check if shadow path is being updated
                const currentPath = nightZone.getAttribute('d');
                document.getElementById('shadow-path').textContent = currentPath ? '已更新' : '未初始化';
                
                // Check transition state
                const transition = nightZone.style.transition;
                const isFastTransition = transition.includes('0.08s');
                document.getElementById('transition-state').textContent = isFastTransition ? '快速响应' : '平滑过渡';
                
                // Check drag status
                const isDragging = nightZone.classList.contains('dragging');
                document.getElementById('drag-status').textContent = isDragging ? '拖拽中' : '未激活';
            }
        }
        
        // Test functions
        window.testSmoothDrag = function() {
            log('🎯 开始平滑拖拽测试...');
            
            // Simulate smooth dragging around the clock
            let angle = 0;
            const dragInterval = setInterval(() => {
                angle += 5;
                if (angle >= 360) {
                    clearInterval(dragInterval);
                    log('✅ 平滑拖拽测试完成');
                    return;
                }
                
                const bedtime = (angle / 360) * 1440;
                const wakeTime = ((angle + 120) / 360) * 1440;
                
                selector.state.bedtimeMinutes = bedtime;
                selector.state.wakeTimeMinutes = wakeTime % 1440;
                
                lastShadowUpdate = performance.now();
            }, 50);
        };
        
        window.testRapidChanges = function() {
            log('⚡ 开始快速变化测试...');
            
            // Rapid random changes
            let changes = 0;
            const rapidInterval = setInterval(() => {
                if (changes >= 20) {
                    clearInterval(rapidInterval);
                    log('✅ 快速变化测试完成');
                    return;
                }
                
                const bedtime = Math.random() * 1440;
                const wakeTime = Math.random() * 1440;
                
                selector.state.bedtimeMinutes = bedtime;
                selector.state.wakeTimeMinutes = wakeTime;
                
                lastShadowUpdate = performance.now();
                changes++;
            }, 100);
        };
        
        window.testCrossMidnight = function() {
            log('🌙 开始跨午夜测试...');
            
            // Test cross-midnight scenarios
            const scenarios = [
                { bedtime: 1380, wake: 60 },   // 23:00 - 01:00
                { bedtime: 1320, wake: 120 },  // 22:00 - 02:00
                { bedtime: 1260, wake: 180 },  // 21:00 - 03:00
                { bedtime: 1200, wake: 240 },  // 20:00 - 04:00
            ];
            
            let index = 0;
            const midnightInterval = setInterval(() => {
                if (index >= scenarios.length) {
                    clearInterval(midnightInterval);
                    log('✅ 跨午夜测试完成');
                    return;
                }
                
                const scenario = scenarios[index];
                selector.state.bedtimeMinutes = scenario.bedtime;
                selector.state.wakeTimeMinutes = scenario.wake;
                
                log(`设置跨午夜时间: ${selector.minutesToTime(scenario.bedtime)} - ${selector.minutesToTime(scenario.wake)}`);
                
                lastShadowUpdate = performance.now();
                index++;
            }, 1500);
        };
        
        window.testShadowSync = function() {
            log('🔄 开始阴影同步测试...');
            
            // Test if shadow follows sleep arc perfectly
            let angle = 0;
            const syncInterval = setInterval(() => {
                angle += 30;
                if (angle >= 360) {
                    clearInterval(syncInterval);
                    log('✅ 阴影同步测试完成');
                    return;
                }
                
                const bedtime = (angle / 360) * 1440;
                const wakeTime = ((angle + 90) / 360) * 1440;
                
                selector.state.bedtimeMinutes = bedtime;
                selector.state.wakeTimeMinutes = wakeTime % 1440;
                
                // Verify shadow and arc are in sync
                const sleepArc = document.getElementById('sleep-arc');
                const nightZone = document.getElementById('night-zone');
                
                if (sleepArc && nightZone) {
                    const arcPath = sleepArc.getAttribute('d');
                    const shadowPath = nightZone.getAttribute('d');
                    
                    // Simple path similarity check
                    const arcLength = arcPath ? arcPath.length : 0;
                    const shadowLength = shadowPath ? shadowPath.length : 0;
                    
                    if (Math.abs(arcLength - shadowLength) < 50) {
                        log(`✅ 角度 ${Math.round(angle)}°: 阴影与弧线同步`);
                    } else {
                        log(`⚠️ 角度 ${Math.round(angle)}°: 阴影可能不同步`);
                    }
                }
                
                lastShadowUpdate = performance.now();
            }, 200);
        };
        
        window.resetTest = function() {
            selector.reset();
            log('🔄 选择器已重置');
        };
        
        function log(message) {
            const output = document.getElementById('debug-log');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent = `[${timestamp}] ${message}\n` + output.textContent;
            
            // Keep only last 8 messages
            const lines = output.textContent.split('\n');
            if (lines.length > 8) {
                output.textContent = lines.slice(0, 8).join('\n');
            }
        }
    </script>
</body>
</html>
