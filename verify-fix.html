<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证第8旬修复</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .section { margin: 20px 0; padding: 15px; background: white; border-radius: 8px; }
        .error { color: red; }
        .success { color: green; }
        .debug { color: #666; }
        .highlight { background: yellow; padding: 2px; }
        pre { background: #f8f8f8; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 第8旬日期范围修复验证</h1>
    
    <div class="section">
        <h2>修复前 vs 修复后对比</h2>
        <div id="comparison">计算中...</div>
    </div>
    
    <div class="section">
        <h2>第8旬详细信息</h2>
        <div id="xun8-details">计算中...</div>
    </div>

    <script type="module">
        // 模拟Calendar类
        const Calendar = {
            pad2(n) {
                return String(n).padStart(2, '0');
            },
            
            formatLocalDate(d) {
                return `${d.getFullYear()}-${this.pad2(d.getMonth() + 1)}-${this.pad2(d.getDate())}`;
            },
            
            getXunPeriods(year) {
                const periods = [];
                const yearStart = new Date(year, 0, 1);
                const XUN_COUNT = 36;
                const XUN_DAYS = 10;
                
                for (let i = 1; i <= XUN_COUNT; i++) {
                    const daysFromStart = (i - 1) * XUN_DAYS;
                    const startDate = new Date(yearStart);
                    startDate.setDate(yearStart.getDate() + daysFromStart);
                    
                    let daysInXun = XUN_DAYS;
                    
                    if (i === XUN_COUNT) {
                         const yearEnd = new Date(year, 11, 31);
                         const diffTime = Math.abs(yearEnd - startDate);
                         const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                         daysInXun = diffDays + 1;
                    }

                    const endDate = new Date(startDate);
                    endDate.setDate(startDate.getDate() + daysInXun - 1);
                    
                    periods.push({ index: i, startDate, endDate, days: daysInXun });
                }
                
                return periods;
            },
            
            getXunRange(dateInput = new Date()) {
                // 原有的月历系统（修复前）
                const date = dateInput instanceof Date ? dateInput : new Date(dateInput);
                const year = date.getFullYear();
                const month = date.getMonth();
                const day = date.getDate();
                const lastDay = new Date(year, month + 1, 0).getDate();

                let startDay = 1;
                let endDay = 10;

                if (day >= 11 && day <= 20) {
                    startDay = 11;
                    endDay = 20;
                } else if (day >= 21) {
                    startDay = 21;
                    endDay = lastDay;
                }

                return {
                    startDate: new Date(year, month, startDay),
                    endDate: new Date(year, month, endDay)
                };
            }
        };
        
        // 修复后的getXunRange函数
        function getXunRangeFixed(inputDate = new Date()) {
            // 使用年历系统获取旬范围，确保与全景视图一致
            const year = inputDate.getFullYear();
            const periods = Calendar.getXunPeriods(year);
            
            // 找到输入日期所在的旬
            const targetPeriod = periods.find(p => {
                const date = new Date(inputDate);
                return date >= p.startDate && date <= p.endDate;
            });
            
            if (targetPeriod) {
                return {
                    startDate: targetPeriod.startDate,
                    endDate: targetPeriod.endDate
                };
            }
            
            // 降级到原有的月历系统
            return Calendar.getXunRange(inputDate);
        }
        
        function verifyFix() {
            const year = 2026;
            const periods = Calendar.getXunPeriods(year);
            const xun8 = periods.find(p => p.index === 8);
            
            // 测试日期：3月15日（应该在第8旬）
            const testDate = new Date(2026, 2, 15);
            
            // 修复前的结果
            const beforeFix = Calendar.getXunRange(testDate);
            
            // 修复后的结果
            const afterFix = getXunRangeFixed(testDate);
            
            const comparisonDiv = document.getElementById('comparison');
            comparisonDiv.innerHTML = `
                <h3>测试日期：3月15日</h3>
                <p><span class="highlight">修复前（月历系统）:</span> ${Calendar.formatLocalDate(beforeFix.startDate)} ~ ${Calendar.formatLocalDate(beforeFix.endDate)}</p>
                <p><span class="highlight">修复后（年历系统）:</span> ${Calendar.formatLocalDate(afterFix.startDate)} ~ ${Calendar.formatLocalDate(afterFix.endDate)}</p>
                <p><span class="highlight">年历第8旬实际范围:</span> ${xun8 ? Calendar.formatLocalDate(xun8.startDate) + ' ~ ' + Calendar.formatLocalDate(xun8.endDate) : '未找到'}</p>
                <p class="${afterFix.startDate.getTime() === xun8?.startDate.getTime() && afterFix.endDate.getTime() === xun8?.endDate.getTime() ? 'success' : 'error'}">
                    ${afterFix.startDate.getTime() === xun8?.startDate.getTime() && afterFix.endDate.getTime() === xun8?.endDate.getTime() ? '✅ 修复成功！旬本小结现在使用正确的年历系统' : '❌ 修复失败'}
                </p>
            `;
            
            // 第8旬详细信息
            const detailsDiv = document.getElementById('xun8-details');
            if (xun8) {
                detailsDiv.innerHTML = `
                    <p><strong>第8旬（年历系统）:</strong></p>
                    <p>开始日期: ${Calendar.formatLocalDate(xun8.startDate)}</p>
                    <p>结束日期: ${Calendar.formatLocalDate(xun8.endDate)}</p>
                    <p>包含天数: ${xun8.days}</p>
                    <p>开始星期: ${['周日','周一','周二','周三','周四','周五','周六'][xun8.startDate.getDay()]}</p>
                    <p>结束星期: ${['周日','周一','周二','周三','周四','周五','周六'][xun8.endDate.getDay()]}</p>
                `;
            }
            
            console.log('=== 修复验证完成 ===');
            console.log('修复前:', Calendar.formatLocalDate(beforeFix.startDate), '~', Calendar.formatLocalDate(beforeFix.endDate));
            console.log('修复后:', Calendar.formatLocalDate(afterFix.startDate), '~', Calendar.formatLocalDate(afterFix.endDate));
            console.log('年历第8旬:', xun8 ? Calendar.formatLocalDate(xun8.startDate) + ' ~ ' + Calendar.formatLocalDate(xun8.endDate) : '未找到');
        }
        
        // 执行验证
        verifyFix();
    </script>
</body>
</html>
